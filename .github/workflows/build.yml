# Build the Convoy release image, push it to GHCR, then pin the new immutable
# sha tag into k8s/kustomization.yaml and commit it back. That manifest change
# is what makes Flux roll the Deployment automatically.
#
# The home-cloud k3s cluster runs on Apple Silicon (arm64) Lima VMs, so we
# build linux/arm64 on a native arm64 runner (free for public repos).
name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
    # Only rebuild when something that affects the image changes — not on k8s/
    # docs/examples edits (and not on the bot's own kustomization commit).
    paths:
      - lib/**
      - assets/**
      - config/**
      - priv/**
      - rel/**
      - mix.exs
      - mix.lock
      - Dockerfile
      - .dockerignore
      - .github/workflows/build.yml
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/convoy

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Pin the immutable sha tag into the manifest so Flux rolls the new image.
      # A GITHUB_TOKEN push does not trigger another workflow run, so no loop.
      - name: Pin image tag for GitOps rollout
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sed -i "s|newTag: .*|newTag: sha-${GITHUB_SHA}|" k8s/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git diff --cached --quiet || git commit -m "ci: roll deployment to sha-${GITHUB_SHA}"
          git push
