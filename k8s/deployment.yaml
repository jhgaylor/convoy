apiVersion: apps/v1
kind: Deployment
metadata:
  name: convoy
  namespace: convoy
  labels:
    app: convoy
  annotations:
    # Restart the pod when the Infisical operator updates convoy-secrets
    # (SECRET_KEY_BASE is read at boot, so a rotation needs a restart).
    secrets.infisical.com/auto-reload: "true"
spec:
  replicas: 1
  # Region snapshots are on an RWO Longhorn volume; a rolling update would
  # deadlock waiting for the old pod to release it, so tear down first.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: convoy
  template:
    metadata:
      labels:
        app: convoy
    spec:
      # This pod runs the untrusted WASM tier. Defense in depth around the
      # in-BEAM isolation (fuel + StoreLimits + WasmSupervisor, primer §7): no
      # cluster API token, non-root, no extra capabilities, default seccomp. The
      # OS-level layer the primer ultimately wants (a separate gVisor/Firecracker
      # node pool for the runner) is documented in docs/security.md; the seam is
      # the commented runtimeClassName/nodeSelector below.
      automountServiceAccountToken: false
      # The image runs as `nobody` (uid/gid 65534); fsGroup makes the mounted
      # volume group-writable so snapshots can be written.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      # OS-level isolation seam (primer §7/§10): once the cluster has a gVisor
      # RuntimeClass and a labelled runner node pool, uncomment to schedule the
      # untrusted WASM tier onto it. Left commented so the app still schedules on
      # a cluster without them.
      # runtimeClassName: gvisor
      # nodeSelector:
      #   convoy.inevitable.fyi/pool: runner
      containers:
        - name: convoy
          image: ghcr.io/jhgaylor/convoy:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: PHX_SERVER
              value: "true"
            - name: PHX_HOST
              value: convoy.inevitable.fyi
            - name: PORT
              value: "4000"
            # Colony snapshots land under the mounted volume so colonies survive
            # deploys. A fresh subdir (the old /data/regions held v1 snapshots).
            - name: CONVOY_DATA_DIR
              value: /data/colony
            # Delegate untrusted source compilation to the sandboxed builder
            # service (rust/tinygo/assemblyscript) instead of running toolchains
            # in this pod. WAT + Rules DSL are still handled in-process.
            - name: CONVOY_BUILDER_URL
              value: http://convoy-builder.convoy.svc.cluster.local
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: convoy-secrets
                  key: SECRET_KEY_BASE
          ports:
            - name: http
              containerPort: 4000
          # Host: localhost is in force_ssl's exclude list (config/prod.exs), so
          # probes get a plain 200 instead of a 301→https redirect. Real traffic
          # arrives via Traefik with X-Forwarded-Proto: https and serves normally.
          readinessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: convoy-data
