# Pulls runtime secrets from the self-hosted Infisical (magpie) `convoy`
# project and materializes them into a native K8s Secret (`convoy-secrets`)
# that the Deployment reads via secretKeyRef.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: convoy-secrets
  namespace: convoy
spec:
  # Internal Service DNS — no Traefik/Cloudflare round-trip for in-cluster reconciles.
  hostAPI: http://infisical.infisical.svc.cluster.local:8080
  resyncInterval: 60
  authentication:
    # Kubernetes-native auth: no stored credential (see home-cloud
    # docs/sops-to-infisical-migration.md, Phase 2 pattern).
    kubernetesAuth:
      # convoy-operator machine identity on the Infisical server.
      identityId: e5041ee0-f1b5-427f-b7df-87530cdfc27b
      autoCreateServiceAccountToken: true
      serviceAccountRef:
        name: convoy-infisical
        namespace: convoy
      secretsScope:
        projectSlug: convoy-cur-e
        envSlug: prod
        secretsPath: "/"
  managedSecretReference:
    secretName: convoy-secrets
    secretNamespace: convoy
    creationPolicy: Orphan
