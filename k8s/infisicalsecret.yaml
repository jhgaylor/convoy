# Pulls runtime secrets from the self-hosted Infisical (magpie) `convoy`
# project and materializes them into a native K8s Secret (`convoy-secrets`)
# that the Deployment reads via secretKeyRef. The only SOPS-encrypted file is
# the operator's machine-identity credentials (convoy-infisical-auth.enc.yaml).
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: convoy-secrets
  namespace: convoy
spec:
  # Internal Service DNS — no Traefik/Cloudflare round-trip for in-cluster reconciles.
  hostAPI: http://infisical.infisical.svc.cluster.local:8080
  resyncInterval: 60
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: convoy-cur-e
        envSlug: prod
        secretsPath: "/"
      credentialsRef:
        secretName: convoy-infisical-auth
        secretNamespace: convoy
  managedSecretReference:
    secretName: convoy-secrets
    secretNamespace: convoy
    creationPolicy: Orphan
