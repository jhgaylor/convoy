apiVersion: v1
kind: Service
metadata:
  name: convoy
  namespace: convoy
  labels:
    app: convoy
  annotations:
    # Also reachable on the tailnet at `convoy` (handy before public DNS/TLS
    # resolves). Remove if Tailscale access isn't wanted.
    tailscale.com/expose: "true"
    tailscale.com/hostname: "convoy"
spec:
  type: ClusterIP
  selector:
    app: convoy
  ports:
    - name: http
      port: 80
      targetPort: http
