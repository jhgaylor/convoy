apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - pvc.yaml
  # Runtime secrets come from the self-hosted Infisical (magpie). The operator
  # authenticates with the SOPS-encrypted machine-identity creds and
  # materializes the `convoy-secrets` Secret the Deployment consumes.
  - convoy-infisical-auth.enc.yaml
  - infisicalsecret.yaml
  - deployment.yaml
  - service.yaml
  - ingressroute.yaml
  - certificates.yaml
