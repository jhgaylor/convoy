apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - pvc.yaml
  # Runtime secrets come from the self-hosted Infisical (magpie). The operator
  # authenticates with the SOPS-encrypted machine-identity creds and
  # materializes the `convoy-secrets` Secret the Deployment consumes.
  - convoy-infisical-auth.enc.yaml
  - infisicalsecret.yaml
  - deployment.yaml
  - service.yaml
  - ingressroute.yaml
  - certificates.yaml
  # Sandboxed compile service (toolchains, no secrets, egress denied).
  - builder-deployment.yaml
  - builder-service.yaml
  - builder-networkpolicy.yaml

# The app image is pinned to an immutable commit-sha tag, which the build
# workflow rewrites on every push (`kustomize edit set image`). Changing the
# tag changes the pod template, so Flux rolls the Deployment automatically —
# no manual `kubectl rollout restart`. (The builder image changes rarely and
# stays on :latest.)
images:
  - name: ghcr.io/jhgaylor/convoy
    newTag: sha-1997265d9f7950bf2b16c45813a6ff8706b14ada
